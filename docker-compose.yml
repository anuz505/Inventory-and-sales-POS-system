services:
  postgres:
    image: postgres:15-alpine
    container_name: inventory_sale_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory-sales-db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventory-sales-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_cache_inventory_sales
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - inventory-sales-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: inventory_sales_backend
    ports:
      - 8000:8000
    environment:
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory-sales-db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 1
      PYTHONUNBUFFERED: 1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inventory-sales-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  inventory-sales-network:
    driver: bridge
